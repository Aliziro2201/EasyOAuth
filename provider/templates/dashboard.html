<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TajanProvider • Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static' , filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static' , filename='css/all.min.css') }}">
</head>
<body>
  <!-- Fixed Navbar (same style as other pages) -->
  <header class="navbar" id="navbar">
    <div class="nav-container">
      <!-- Site name: TajanProvider - EDIT HERE to change -->
      <a href="/" class="logo" aria-label="TajanProvider home">TajanProvider</a>
      <nav class="nav-links">
        <!-- Login page link -->
        <a href="/user/login">Login</a>
        <!-- Dashboard page (active) -->
        <a href="/user/dashboard" class="active">Dashboard</a>
        <!-- Logout button -->
        <a href="#" id="logoutButton" class="logout-link">Logout</a>
      </nav>
    </div>
  </header>

  <!-- Dashboard Main Content -->
  <main class="dashboard-main">
    <div class="dashboard-container">
      <!-- Page heading -->
      <div class="dashboard-header">
        <h1>User Dashboard</h1>
        <p>Your account information</p>
      </div>

      <!-- Loading state -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Loading user data...</p>
      </div>

      <!-- Error state -->
      <div class="error-state" id="errorState" style="display: none;">
        <div class="error-icon">⚠️</div>
        <h2>Failed to load data</h2>
        <p id="errorMessage">Unable to fetch user information. Please try again.</p>
        <button class="retry-button" id="retryButton">Retry</button>
      </div>

      <!-- User info card -->
      <div class="user-card" id="userCard" style="display: none;">
        <div class="user-avatar">
          <span id="userInitials">U</span>
        </div>
        
        <div class="user-info-grid">
          <!-- Name -->
          <div class="info-item">
            <span class="info-label">Name</span>
            <span class="info-value" id="userName">-</span>
          </div>

          <!-- Username -->
          <div class="info-item">
            <span class="info-label">Username</span>
            <span class="info-value" id="userUsername">-</span>
          </div>

          <!-- Email -->
          <div class="info-item">
            <span class="info-label">Email</span>
            <span class="info-value" id="userEmail">-</span>
          </div>

          <!-- Password (masked) -->
          <div class="info-item">
            <span class="info-label">Password</span>
            <div class="password-display">
              <span class="info-value" id="userPassword">-</span>
              <button class="toggle-visibility" id="togglePasswordVisibility" aria-label="Toggle password visibility">
                👁️
              </button>
            </div>
          </div>

          <!-- Age -->
          <div class="info-item">
            <span class="info-label">Age</span>
            <span class="info-value" id="userAge">-</span>
          </div>
        </div>

        <!-- Refresh button -->
        <div class="card-footer">
          <button class="refresh-button" id="refreshButton">
            🔄 Refresh Data
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <!-- EDIT: Change "Made by" text -->
    <div class="footer-made">Made by AliZiro</div>
    <div class="footer-links">
           <a href="#" id="footerGitHubLink"><i class="fab fa-github"></i> GitHub</a>
           <a href="#" id="footerTelegramLink"><i class="fab fa-telegram"></i> Telegram</a>
          <a href="#" id="footerBaleLink">
          <i class="fas fa-comment"></i> Iranian Messenger
          </a>
          <!-- Donation Link - REPLACE href -->
          <a href="#" id="footerDonationLink"><i class="fas fa-hand-holding-heart"></i> Support Us</a>
    </div>
  </footer>

  <script src="{{ url_for('static' , filename='js/dashboard.js') }}"></script>
</body>
</html>
