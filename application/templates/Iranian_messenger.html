<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Us</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0a0a0f;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(22, 22, 40, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: #f0f0f8;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8888a8;
      margin-bottom: 2rem;
    }

    .messenger-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messenger-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-radius: 16px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .messenger-link:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .messenger-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .bale-icon {
      background: rgba(52, 211, 153, 0.12);
    }

    .eitaa-icon {
      background: rgba(245, 158, 11, 0.12);
    }

    .messenger-info {
      text-align: left;
      flex: 1;
    }

    .messenger-name {
      font-weight: 600;
      font-size: 1rem;
      color: #f0f0f8;
    }

    .messenger-desc {
      font-size: 0.8rem;
      color: #8888a8;
      margin-top: 0.15rem;
    }

    .arrow {
      font-size: 1.2rem;
      color: #5a5a7a;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .messenger-link:hover .arrow {
      color: #8b8bb8;
      transform: translateX(3px);
    }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #5a5a7a;
    }
    
  </style>
</head>
<body>
  <div class="card">
    <h1>📱 Follow Us</h1>
    <p class="subtitle">Stay connected through Iranian messengers</p>

    <div class="messenger-list">
      <!-- Bale -->
      <a href="https://ble.ir/Tajan_Security" target="_blank" rel="noopener noreferrer" class="messenger-link">
        <div class="messenger-icon bale-icon">🟢</div>
        <div class="messenger-info">
          <div class="messenger-name">Bale</div>
          <div class="messenger-desc">Follow our channel on Bale</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Eitaa -->
      <a href="https://rubika.ir/Tajan_Security" target="_blank" rel="noopener noreferrer" class="messenger-link">
        <div class="messenger-icon eitaa-icon">🟠</div>
        <div class="messenger-info">
          <div class="messenger-name">Rubika</div>
          <div class="messenger-desc">Follow our channel on Rubika</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <p class="footer-note">Click to open and follow ✨</p>
  </div>
</body>
</html>
