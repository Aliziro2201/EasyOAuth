<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invalid Credentials</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .error-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .error-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(4px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
    }

    p {
      font-size: 0.95rem;
      color: #86868b;
      margin-bottom: 1.8rem;
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      background: #0071e3;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      background: #0077ed;
      box-shadow: 0 4px 14px rgba(0, 113, 227, 0.28);
    }

    .btn-secondary {
      display: inline-block;
      margin-top: 0.8rem;
      color: #0071e3;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .btn-secondary:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <span class="error-icon">🔒</span>
    <h1>Invalid Credentials</h1>
    <p>The username or password you entered is incorrect. Please try again.</p>
    <a href="{{ url_for('login') }}" class="btn">Try Again</a>
    <br>
    <a href="/" class="btn-secondary">← Back to Home</a>
  </div>
</body>
</html>
