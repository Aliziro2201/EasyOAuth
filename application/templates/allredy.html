<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TajanApplication • Already Logged In</title>
  <style>
    /* Embedded CSS for single-file simplicity */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-darker: #050508;
      --card-bg: rgba(20, 20, 30, 0.8);
      --primary-blue: #3b82f6;
      --primary-purple: #8b5cf6;
      --primary-green: #10b981;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --border-light: rgba(255, 255, 255, 0.1);
      --glow-green: rgba(16, 185, 129, 0.3);
      --glow-blue: rgba(59, 130, 246, 0.3);
      --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --radius-xl: 20px;
      --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      background-image: radial-gradient(circle at 20% 10%, rgba(16,185,129,0.06) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(59,130,246,0.05) 0%, transparent 40%);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .already-card {
      background: var(--card-bg);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      max-width: 480px;
      width: 100%;
      padding: 3rem 2rem;
      text-align: center;
    }

    .already-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .already-card h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: #34d399;
    }

    .already-card p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    .user-greeting {
      color: #a5b4fc;
      font-weight: 500;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .dashboard-button {
      display: inline-block;
      background: var(--gradient-primary);
      color: #ffffff;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .dashboard-button:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px var(--glow-blue);
      transform: translateY(-1px);
    }

    .dashboard-button:active {
      transform: scale(0.98);
    }

    .logout-button {
      display: inline-block;
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      text-decoration: none;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 10px 28px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .logout-button:hover {
      background: rgba(239, 68, 68, 0.25);
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }

    .home-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      border-bottom: 1px dotted rgba(148, 163, 184, 0.4);
      transition: color 0.2s, border-color 0.2s;
    }

    .home-link:hover {
      color: #cbd5e1;
      border-bottom-color: #cbd5e1;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .already-card {
        padding: 2.5rem 1.5rem;
      }
      
      .already-icon {
        font-size: 3rem;
      }
      
      .already-card h1 {
        font-size: 1.5rem;
      }
      
      .already-card p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="already-card">
    <!-- Checkmark icon -->
    <span class="already-icon">✅</span>
    
    <!-- Heading - EDIT TEXT HERE -->
    <h1>You're Already Logged In</h1>
    
    <!-- Message - EDIT TEXT HERE -->
    <p>
      You are currently signed in to your account.
      There's no need to log in again.
    </p>
    
    <!-- Username display - populated by JavaScript -->
    <p class="user-greeting" id="userGreeting"></p>
    
    <!-- Action buttons -->
    <div class="button-group">
      <!-- Dashboard button - EDIT href -->
      <a href="{{ url_for('dashboard') }}" class="dashboard-button">Go to Dashboard</a>

    </div>
    
    <!-- Home link - EDIT href -->

    <a href="/" class="home-link">← Back to Home</a>
  </div>
